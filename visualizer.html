<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>BINGUSDINGUS</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <link rel="icon" type="image/x-icon" href="./content/img/favicon.ico" />
</head>

<body>
  <div>
    <div class="navbar bg-body-secondary">
      <div class="container-fluid">
        <button type="button" class="navbar-toggler d-lg-none" data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle Navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a href="#" class="navbar-brand">
          <img src="./content/img/favicon.ico" alt="BINGUSDINGUS" width="30" height="24" />
        </a>
      </div>
    </div>
  </div>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-2 px-0">
        <div id="offcanvasNavbar" class="offcanvas-lg offcanvas-start bg-body-tertiary h-100" tabindex="-1"
          aria-labelledby="offcanvasNavbarLabel">
          <div class="offcanvas-header">
            <h5 id="offcanvasNavbarLabel" class="offcanvas-title">
              Navigation
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#offcanvasNavbar"
              aria-label="Close"></button>
          </div>
          <div class="offcanvas-body h-100 w-100">
            <div class="d-flex flex-column flex-shrink-0 h-100 w-100">
              <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                  <a class="nav-link rounded-0" href="./index.html">Home</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link rounded-0 active" aria-current="page" href="./visualizer.html">Fight Stick
                    Visualizer</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <main class="col-12 col-lg-10 overflow-y-auto py-3" style="
            height: calc(100vh - 56px) !important;
            max-height: calc(100vh - 56px) !important;
          ">
        <div class="row gy-3">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <div class="row">
                  <div class="col-6">MOVEMENT</div>
                  <div class="col-6">BUTTON</div>
                </div>
              </div>
            </div>
          </div>
          <div id="test" class="col-12 col-lg-6">
          </div>
          <div id="test2" class="col-12 col-lg-6">
          </div>
        </div>
      </main>
    </div>
  </div>

  <template id="color-picker">
    <div class="card">
      <div id="header" class="card-header"></div>
      <div class="card-body">
        <h5 id="title" class="card-title">{TITLE}</h5>
        <p id="description" class="card-text">{DESCRIPTION}</p>
        <div class="row gy-2">
          <div class="col-4 col-lg-3">
            <div class="input-group">
              <label for="red-number" class="input-group-text">R</label>
              <input id="red-number" type="number" class="form-control" min="0" max="255" step="1" onchange="syncValues('red-number', 'red-range')" />
            </div>
          </div>
          <div class="col-8 col-lg-9 d-flex align-items-center">
            <label for="red-range" class="visually-hidden">R</label>
            <input id="red-range" type="range" class="form-range" min="0" max="255" step="1" oninput="syncValues('red-range', 'red-number')" />
          </div>
          <div class="col-4 col-lg-3">
            <div class="input-group">
              <label for="green-number" class="input-group-text">G</label>
              <input id="green-number" type="number" class="form-control" min="0" max="255" step="1" onchange="syncValues('green-number', 'green-range')" />
            </div>
          </div>
          <div class="col-8 col-lg-9 d-flex align-items-center">
            <label for="green-range" class="visually-hidden">G</label>
            <input id="green-range" type="range" class="form-range" min="0" max="255" step="1" oninput="syncValues('green-range', 'green-number')" />
          </div>
          <div class="col-4 col-lg-3">
            <div class="input-group">
              <label for="blue-number" class="input-group-text">B</label>
              <input id="blue-number" type="number" class="form-control" min="0" max="255" step="1" onchange="syncValues('blue-number', 'blue-range')" />
            </div>
          </div>
          <div class="col-8 col-lg-9 d-flex align-items-center">
            <label for="blue-range" class="visually-hidden">B</label>
            <input id="blue-range" type="range" class="form-range" min="0" max="255" step="1" oninput="syncValues('blue-range', 'blue-number')" />
          </div>
          <div class="col-4 col-lg-3">
            <div class="input-group">
              <label for="alpha-number" class="input-group-text">A</label>
              <input id="alpha-number" type="number" class="form-control" min="0" max="1" step="0.1" onchange="syncValues('alpha-number', 'alpha-range')" />
            </div>
          </div>
          <div class="col-8 col-lg-9 d-flex align-items-center">
            <label for="alpha-range" class="visually-hidden">A</label>
            <input id="alpha-range" type="range" class="form-range" min="0" max="1" step="0.1" oninput="syncValues('alpha-range', 'alpha-number')" />
          </div>
        </div>
      </div>
    </div>
    <script type="text/javascript">
      function syncValues(from, to) {
        let a = document.getElementById(from);
        let b = document.getElementById(to);

        b.value = a.value;

        updateColor();
      }

      function updateColor() {
        let h = document.getElementById('header');

        let r = document.getElementById('red-number');
        let g = document.getElementById('green-number');
        let b = document.getElementById('blue-number');
        let a = document.getElementById('alpha-number');

        h.style.backgroundColor = `rgba(${r.value},${g.value},${b.value},${a.value})`;
      }
    </script>
  </template>

  <script type="text/javascript">
    let test = document.getElementById('test');
    let test2 = document.getElementById('test2');
    let template = document.getElementById('color-picker');

    test.appendChild(template.content.cloneNode(true));
    test2.appendChild(template.content.cloneNode(true));
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
</body>

</html>
