<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>BINGUSDINGUS</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/x-icon" href="./content/img/favicon.ico" />
  </head>
  <body>
    <div>
      <div class="navbar bg-body-secondary">
        <div class="container-fluid">
          <button
            type="button"
            class="navbar-toggler d-lg-none"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasNavbar"
            aria-controls="offcanvasNavbar"
            aria-label="Toggle Navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <a href="#" class="navbar-brand">
            <img
              src="./content/img/favicon.ico"
              alt="BINGUSDINGUS"
              width="30"
              height="24"
            />
          </a>
        </div>
      </div>
    </div>
    <div class="container-fluid">
      <div class="row">
        <nav class="col-2 px-0">
          <div
            id="offcanvasNavbar"
            class="offcanvas-lg offcanvas-start bg-body-tertiary h-100"
            tabindex="-1"
            aria-labelledby="offcanvasNavbarLabel"
          >
            <div class="offcanvas-header">
              <h5 id="offcanvasNavbarLabel" class="offcanvas-title">
                Navigation
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"
                data-bs-target="#offcanvasNavbar"
                aria-label="Close"
              ></button>
            </div>
            <div class="offcanvas-body h-100 w-100">
              <div class="d-flex flex-column flex-shrink-0 h-100 w-100">
                <ul class="nav nav-pills flex-column mb-auto">
                  <li class="nav-item">
                    <a class="nav-link" href="#">Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Customizer</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </nav>
        <main
          class="col-12 col-lg-10 overflow-y-auto py-1"
          style="
            height: calc(100vh - 56px) !important;
            max-height: calc(100vh - 56px) !important;
          "
        ></main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
